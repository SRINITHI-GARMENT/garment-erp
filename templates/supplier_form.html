<!DOCTYPE html>
<html>
<head>
<title>Edit Supplier</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
{% include 'sidebar.html' %}

<div class="main">
<h2>EDIT SUPPLIER — {{ supplier.name }}</h2>

<form method="POST" class="form-card" style="max-width:500px;">
    <div class="form-group"><label>Name</label>
        <input name="name" value="{{ supplier.name }}" required></div>
    <div class="form-group"><label>Code</label>
        <input name="code" value="{{ supplier.code }}"></div>
    <div class="form-group"><label>Contact</label>
        <input name="contact" value="{{ supplier.contact }}"></div>
    <div class="form-group"><label>Address</label>
        <input name="address" value="{{ supplier.address }}"></div>
    <button type="submit" class="btn edit">Update</button>
    <a href="/supplier"><button type="button" class="btn secondary">Cancel</button></a>
</form>
</div>
</div>

</body>
</html>
